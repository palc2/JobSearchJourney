<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Saver</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #0f0f11;
    color: #e8e6e1;
    min-height: 100vh;
    padding: 32px 24px;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #7c6fff;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 0.8rem;
    color: #5a5870;
    margin-bottom: 28px;
  }

  .card {
    background: #17161c;
    border: 1px solid #2a2835;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #5a5870;
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    background: #0f0f11;
    border: 1px solid #2a2835;
    border-radius: 8px;
    color: #e8e6e1;
    font-family: inherit;
    font-size: 0.88rem;
    line-height: 1.6;
    padding: 12px;
    resize: vertical;
    min-height: 160px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: #7c6fff; }
  textarea::placeholder { color: #3a3850; }

  input[type="text"] {
    width: 100%;
    background: #0f0f11;
    border: 1px solid #2a2835;
    border-radius: 8px;
    color: #e8e6e1;
    font-family: inherit;
    font-size: 0.88rem;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus { border-color: #7c6fff; }
  input[type="text"]::placeholder { color: #3a3850; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 20px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }

  .btn-primary {
    background: #7c6fff;
    color: #fff;
    width: 100%;
    justify-content: center;
  }

  .btn-primary:hover:not(:disabled) { background: #9080ff; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-save {
    background: #1e3a2e;
    color: #4ade80;
    border: 1px solid #2d5240;
    width: 100%;
    justify-content: center;
    margin-top: 8px;
  }

  .btn-save:hover:not(:disabled) { background: #25472f; }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

  .extracted-grid { display: grid; gap: 12px; }

  .field-block {
    background: #0f0f11;
    border: 1px solid #2a2835;
    border-radius: 8px;
    padding: 12px;
  }

  .field-label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #7c6fff;
    margin-bottom: 6px;
  }

  .field-value {
    font-size: 0.85rem;
    color: #c8c6c0;
    line-height: 1.5;
    white-space: pre-wrap;
  }

  .status {
    font-size: 0.8rem;
    padding: 10px 14px;
    border-radius: 8px;
    margin-top: 12px;
    display: none;
  }

  .status.info    { display: block; background: #1a1830; color: #7c6fff; border: 1px solid #2a2845; }
  .status.success { display: block; background: #1a2e20; color: #4ade80; border: 1px solid #2d4a35; }
  .status.error   { display: block; background: #2e1a1a; color: #f87171; border: 1px solid #4a2d2d; }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .manual-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 4px;
  }

  .manual-grid .full-width { grid-column: 1 / -1; }

  .field-group { display: flex; flex-direction: column; position: relative; }

  .date-hint {
    font-size: 0.72rem;
    color: #7c6fff;
    margin-top: 5px;
    min-height: 16px;
  }

  .why-note { margin-top: 12px; }

  /* Autocomplete dropdown */
  .autocomplete-wrap { position: relative; }

  .ac-dropdown {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: #1f1e26;
    border: 1px solid #3a3850;
    border-radius: 8px;
    z-index: 100;
    max-height: 160px;
    overflow-y: auto;
    display: none;
  }

  .ac-dropdown.open { display: block; }

  .ac-item {
    padding: 9px 12px;
    font-size: 0.85rem;
    color: #c8c6c0;
    cursor: pointer;
    transition: background 0.15s;
  }

  .ac-item:hover, .ac-item.active { background: #2a2840; color: #fff; }
  .required-star { color: #f87171; margin-left: 2px; }

  .field-value.editable {
    outline: none;
    cursor: text;
    border-radius: 4px;
    padding: 2px 4px;
    margin: -2px -4px;
    transition: background 0.15s;
  }
  .field-value.editable:hover { background: #1a1925; }
  .field-value.editable:focus { background: #1a1925; box-shadow: 0 0 0 1px #7c6fff; }
</style>
</head>
<body>

<h1>Job Saver</h1>
<p class="subtitle">Paste a job description → AI extracts the key info → saves to your Google Sheet</p>

<!-- Job Details -->
<div class="card">
  <label>Job Details</label>
  <div class="manual-grid">

    <div class="field-group">
      <label>Job Title <span class="required-star">*</span></label>
      <div class="autocomplete-wrap">
        <input type="text" id="manualTitle" placeholder="e.g. Senior Data Engineer" autocomplete="off"
          oninput="acFilter(this, 'title')" onkeydown="acKey(event, 'title')" onfocus="acFilter(this, 'title')" onblur="acBlur('title')" />
        <div class="ac-dropdown" id="ac-title"></div>
      </div>
    </div>

    <div class="field-group">
      <label>Company <span class="required-star">*</span></label>
      <div class="autocomplete-wrap">
        <input type="text" id="manualCompany" placeholder="e.g. Stripe" autocomplete="off"
          oninput="acFilter(this, 'company')" onkeydown="acKey(event, 'company')" onfocus="acFilter(this, 'company')" onblur="acBlur('company')" />
        <div class="ac-dropdown" id="ac-company"></div>
      </div>
    </div>

    <div class="field-group">
      <label>Location</label>
      <div class="autocomplete-wrap">
        <input type="text" id="manualLocation" placeholder="e.g. New York, NY / Remote" autocomplete="off"
          oninput="acFilter(this, 'location')" onkeydown="acKey(event, 'location')" onfocus="acFilter(this, 'location')" onblur="acBlur('location')" />
        <div class="ac-dropdown" id="ac-location"></div>
      </div>
    </div>

    <div class="field-group">
      <label>Time Posted (as shown on LinkedIn)</label>
      <input type="text" id="manualTimePosted" placeholder="e.g. 2 months ago, 3 weeks ago"
        oninput="resolvePostedDate(this.value)" />
      <div class="date-hint" id="dateHint"></div>
    </div>

    <div class="field-group full-width">
      <label>Job Post URL</label>
      <input type="text" id="manualUrl" placeholder="e.g. https://www.linkedin.com/jobs/view/..." />
    </div>

  </div>
</div>

<!-- Job Description -->
<div class="card">
  <label>Job Description</label>
  <textarea id="jdInput" placeholder="Paste the full job description here — title, company, responsibilities, requirements, salary if listed, everything."></textarea>
  <div class="why-note">
    <label>Why does this role excite you? (optional)</label>
    <input type="text" id="whyInput" placeholder="e.g. love their product, ML infra work, remote-first culture..." />
  </div>
  <br>
  <button class="btn btn-primary" id="extractBtn" onclick="extractJD()">
    <span>Extract with AI</span>
  </button>
  <div class="status" id="extractStatus"></div>
</div>

<!-- Extracted preview -->
<div class="card" id="extractedCard" style="display:none;">
  <label>Extracted Info — review &amp; edit, then copy</label>
  <div class="extracted-grid" id="extractedGrid"></div>
  <br>
  <button class="btn btn-save" id="copyRowBtn" onclick="copyRowForSheet()">
    Copy row for Sheet
  </button>
  <button class="btn" id="copyHeaderBtn" onclick="copyHeader()"
    style="background:#1f1e26;color:#9b93ff;border:1px solid #3a3850;width:100%;justify-content:center;margin-top:8px;">
    Copy header row (first time only)
  </button>
  <textarea id="pasteBox" readonly
    style="margin-top:10px;min-height:60px;font-size:0.78rem;color:#9b93ff;"
    placeholder="Your tab-separated row will appear here — it's copied automatically, or select-all and copy manually."></textarea>
  <div class="status" id="saveStatus"></div>
  <p style="font-size:0.74rem;color:#5a5870;margin-top:10px;line-height:1.5;">
    Paste into the next empty row of your sheet (click cell in column A, then Ctrl/Cmd+V). One paste fills all columns.
  </p>
</div>

<script>
// ── Config ────────────────────────────────────────────────
const SHEET_ID  = '1uIMsebRUBF4M9AtX4l_I0T81EuajGjglJR3Ou1DVCu0';

// ── State ─────────────────────────────────────────────────
let extracted = null;

// Previous entries for autocomplete — keyed by field
const acHistory = { title: new Set(), company: new Set(), location: new Set() };
// Map input id → history key
const acMap = { manualTitle: 'title', manualCompany: 'company', manualLocation: 'location' };
// Track highlighted index per dropdown
const acIdx = { title: -1, company: -1, location: -1 };

// ── Load existing sheet data for autocomplete (via MCP) ───
async function loadHistory() {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1500,
        mcp_servers: [
          { type: 'url', url: 'https://drivemcp.googleapis.com/mcp/v1', name: 'google-drive' }
        ],
        messages: [{
          role: 'user',
          content: `Read the Google Sheet with file ID ${SHEET_ID} and return ONLY a JSON object with three arrays: {"companies": [unique values from the Company column], "titles": [unique values from the Role Title column], "locations": [unique values from the Location column]}. Skip the header row. If empty, return {"companies":[],"titles":[],"locations":[]}. Return only JSON, no other text.`
        }]
      })
    });
    const data = await res.json();
    const text = (data.content || []).map(b => b.text || '').join('');
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) return;
    const hist = JSON.parse(match[0]);
    (hist.companies || []).forEach(v => v && acHistory.company.add(v));
    (hist.titles || []).forEach(v => v && acHistory.title.add(v));
    (hist.locations || []).forEach(v => v && acHistory.location.add(v));
  } catch(e) {
    console.warn('Could not load history for autocomplete:', e);
  }
}

// ── Autocomplete logic ────────────────────────────────────
function acFilter(input, key) {
  const dd = document.getElementById(`ac-${key}`);
  const val = input.value.toLowerCase();
  const matches = [...acHistory[key]].filter(v => v.toLowerCase().includes(val));
  acIdx[key] = -1;
  if (!matches.length) { dd.classList.remove('open'); return; }
  dd.innerHTML = matches.map((m, i) =>
    `<div class="ac-item" onmousedown="acSelect('${key}', this)" data-val="${m}">${m}</div>`
  ).join('');
  dd.classList.add('open');
}

function acSelect(key, el) {
  const inputId = Object.keys(acMap).find(k => acMap[k] === key);
  document.getElementById(inputId).value = el.dataset.val;
  document.getElementById(`ac-${key}`).classList.remove('open');
}

function acBlur(key) {
  // Small delay so mousedown on item fires first
  setTimeout(() => document.getElementById(`ac-${key}`).classList.remove('open'), 150);
}

function acKey(e, key) {
  const dd = document.getElementById(`ac-${key}`);
  const items = dd.querySelectorAll('.ac-item');
  if (!items.length || !dd.classList.contains('open')) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acIdx[key] = Math.min(acIdx[key] + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === acIdx[key]));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acIdx[key] = Math.max(acIdx[key] - 1, 0);
    items.forEach((el, i) => el.classList.toggle('active', i === acIdx[key]));
  } else if (e.key === 'Enter' && acIdx[key] >= 0) {
    e.preventDefault();
    acSelect(key, items[acIdx[key]]);
  } else if (e.key === 'Escape') {
    dd.classList.remove('open');
  }
}

// ── Date resolution ───────────────────────────────────────
function resolvePostedDate(input) {
  const hint = document.getElementById('dateHint');
  if (!input.trim()) { hint.textContent = ''; return; }
  const today = new Date();
  const str = input.toLowerCase().trim();
  let estimated = null;
  const monthMatch = str.match(/(\d+)\s*month/);
  const weekMatch  = str.match(/(\d+)\s*week/);
  const dayMatch   = str.match(/(\d+)\s*day/);
  if (monthMatch) {
    estimated = new Date(today.getFullYear(), today.getMonth() - parseInt(monthMatch[1]), 15);
  } else if (weekMatch) {
    const d = new Date(today);
    d.setDate(d.getDate() - parseInt(weekMatch[1]) * 7 + 3);
    estimated = d;
  } else if (dayMatch) {
    const d = new Date(today);
    d.setDate(d.getDate() - parseInt(dayMatch[1]));
    estimated = d;
  } else if (str.includes('yesterday')) {
    const d = new Date(today); d.setDate(d.getDate() - 1); estimated = d;
  } else if (str.includes('today') || str.includes('just now') || str.includes('hour')) {
    estimated = today;
  }
  if (estimated) {
    const fmt = estimated.toISOString().split('T')[0];
    hint.textContent = `→ estimated ${fmt}`;
    hint.dataset.resolved = fmt;
  } else {
    hint.textContent = 'Could not parse — will save as-is';
    hint.dataset.resolved = '';
  }
}

function getPostedDate() {
  const hint = document.getElementById('dateHint');
  const raw = document.getElementById('manualTimePosted').value.trim();
  if (!raw) return '';
  return hint.dataset.resolved || raw;
}

// ── Fields for preview ────────────────────────────────────
const FIELDS = [
  { key: 'company',          label: 'Company' },
  { key: 'role_title',       label: 'Role Title' },
  { key: 'role_family',      label: 'Role Family' },
  { key: 'seniority',        label: 'Seniority' },
  { key: 'industry',         label: 'Industry' },
  { key: 'company_stage',    label: 'Company Stage' },
  { key: 'headcount_band',   label: 'Headcount Band' },
  { key: 'work_model',       label: 'Work Model' },
  { key: 'location',         label: 'Location' },
  { key: 'posted_date',      label: 'Posted Date (estimated)' },
  { key: 'salary',           label: 'Salary Range' },
  { key: 'tech_stack',       label: 'Tech Stack (normalized)' },
  { key: 'responsibilities', label: 'Key Responsibilities' },
  { key: 'requirements',     label: 'Requirements' },
  { key: 'how_to_succeed',   label: 'How to Succeed in the Role' },
  { key: 'what_we_offer',    label: 'What We Offer' },
  { key: 'interview_process', label: 'Interview Process' },
  { key: 'skills_gap',       label: 'Skills to Prep (edit me)' },
  { key: 'source_url',       label: 'Source URL' },
];

function setStatus(id, type, msg) {
  const el = document.getElementById(id);
  el.className = `status ${type}`;
  el.textContent = msg;
}

// ── Extract ───────────────────────────────────────────────
async function extractJD() {
  const title   = document.getElementById('manualTitle').value.trim();
  const company = document.getElementById('manualCompany').value.trim();
  if (!title)   { setStatus('extractStatus', 'error', 'Job Title is required.'); return; }
  if (!company) { setStatus('extractStatus', 'error', 'Company is required.'); return; }

  const jd = document.getElementById('jdInput').value.trim();

  const btn = document.getElementById('extractBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span><span>Extracting…</span>';
  setStatus('extractStatus', 'info', 'Claude is reading the job description…');
  document.getElementById('extractedCard').style.display = 'none';

  const why = document.getElementById('whyInput').value.trim();

  const whyInstruction = why
    ? `- why_exciting: the user wrote: "${why}" — distill into 3-5 comma-separated keywords or short phrases capturing the essence (e.g. "ML infra, remote-first, strong eng culture"). No full sentences.`
    : `- why_exciting: ""`;

  const l = document.getElementById('manualLocation').value.trim();
  const u = document.getElementById('manualUrl').value.trim();

  try {
    if (!jd) {
      // No JD — build from manual fields only, skip AI
      extracted = {
        company: company, role_title: title,
        role_family: '', seniority: '', industry: '',
        company_stage: '', headcount_band: '', work_model: '',
        location: l, posted_date: getPostedDate(),
        salary: '', tech_stack: '', responsibilities: '',
        requirements: '', how_to_succeed: '', what_we_offer: '',
        interview_process: '', skills_gap: '', source_url: u,
        why_exciting: why ? why.slice(0, 80) : ''
      };
      renderExtracted();
      setStatus('extractStatus', 'success', 'Saved from manual fields. Review below then save.');
    } else {
      // JD provided — run AI extraction
      const prompt = `Extract structured information from this job description. Return ONLY a valid JSON object with these exact keys. For the controlled-vocabulary fields, you MUST pick exactly ONE value from the allowed list (closest match if ambiguous).

- company: company name
- role_title: exact job title from the posting
- role_family: ONE of [Analytics Engineer, Data Engineer, Sales Engineer, Data Scientist, Data Analyst, Platform/Infra, Software Engineer, Other]
- seniority: ONE of [Junior, Mid, Senior, Staff+] — infer from title and years required
- industry: ONE of [Data Infra, Fintech, Healthtech, E-commerce, Dev Tools, AI/ML, Gaming, Enterprise SaaS, Other]
- company_stage: ONE of [Seed, Series A-B, Series C+, Public, Private-established, Unknown]
- headcount_band: ONE of [1-50, 51-200, 201-1000, 1000+, Unknown]
- work_model: ONE of [Remote, Hybrid, Onsite, Unknown]
- location: city/region as stated (just the place, not remote policy)
- salary: salary range as listed, or "Not listed"
- tech_stack: comma-separated list of tools/languages/frameworks. NORMALIZE to canonical names: use "Airflow" (not Apache Airflow), "Postgres" (not PostgreSQL), "BigQuery" (not GBQ/Google BigQuery), "dbt" (lowercase), "Spark" (not Apache Spark), "Kafka" (not Apache Kafka). De-duplicate.
- responsibilities: 3-5 bullets summarizing main duties (use • as bullet)
- requirements: 3-5 bullets of key qualifications (use • as bullet)
- how_to_succeed: if the posting describes how success in this role is measured (KPIs, goals, what "great" looks like, 30/60/90 day expectations), summarize in 2-4 bullets (use • as bullet). If not described, "".
- what_we_offer: if the posting lists benefits/perks (health, PTO, 401k, equity, etc.), summarize in 2-4 bullets (use • as bullet). If not described, "".
- interview_process: if the posting describes the interview stages/process, summarize them in order as 2-5 bullets (use • as bullet). If not described, "".
- skills_gap: identify the 2-4 most specialized or demanding technical requirements in THIS posting that a candidate would most likely need to study or prepare for an interview (e.g. "Iceberg internals, Kafka streaming, dbt at scale"). Comma-separated keywords. These are prep targets, not assumptions about the candidate.
- source_url: any URL mentioned, otherwise "Not listed"
${whyInstruction}

Job description:
${jd}

Return only the JSON object, no markdown, no explanation.`;

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await res.json();
      const text = data.content.map(b => b.text || '').join('');
      extracted = JSON.parse(text.replace(/```json|```/g, '').trim());

      // Manual fields always override AI
      extracted.role_title  = title;
      extracted.company     = company;
      if (l) extracted.location   = l;
      if (u) extracted.source_url = u;
      extracted.posted_date = getPostedDate();

      renderExtracted();
      setStatus('extractStatus', 'success', 'Extracted! Review below then save.');
    }
  } catch(e) {
    setStatus('extractStatus', 'error', 'Extraction failed: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span>Extract with AI</span>';
  }
}

function renderExtracted() {
  const grid = document.getElementById('extractedGrid');
  grid.innerHTML = '';
  const allFields = [...FIELDS];
  if (extracted.why_exciting !== undefined) allFields.push({ key: 'why_exciting', label: 'Why It Excites Me' });
  for (const f of allFields) {
    const val = extracted[f.key] || '';
    grid.innerHTML += `
      <div class="field-block">
        <div class="field-label">${f.label}</div>
        <div class="field-value editable" contenteditable="true"
             data-key="${f.key}" oninput="extracted['${f.key}'] = this.textContent">${val || '—'}</div>
      </div>`;
  }
  document.getElementById('extractedCard').style.display = 'block';
}

// ── DIAGNOSTIC: test if mcp_servers works through the artifact's API proxy ──
async function testMcpConnection() {
  const out = document.getElementById('mcpTestResult');
  out.textContent = 'Testing…';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 300,
        mcp_servers: [
          { type: 'url', url: 'https://drivemcp.googleapis.com/mcp/v1', name: 'google-drive' }
        ],
        messages: [{
          role: 'user',
          content: 'Using the Google Drive tool, list the names of up to 3 files you can see. Just give me a short list of titles, nothing else.'
        }]
      })
    });
    const data = await res.json();
    if (data.error) {
      out.textContent = '❌ API error: ' + JSON.stringify(data.error);
      return;
    }
    const text = (data.content || []).map(b => b.text || '').join('');
    const usedMcp = (data.content || []).some(b => b.type === 'mcp_tool_use' || b.type === 'mcp_tool_result');
    out.textContent = (usedMcp ? '✅ MCP TOOL USED. ' : '⚠️ No MCP tool call detected. ') + 'Response: ' + (text || JSON.stringify(data.content));
  } catch(e) {
    out.textContent = '❌ Fetch failed entirely: ' + e.message;
  }
}

// ── Column schema (shared by header + row) ────────────────
const HEADER_ROW = ['Date Saved','Company','Role Title','Role Family','Seniority','Industry','Company Stage','Headcount Band','Work Model','Location','Posted Date','Salary','Tech Stack','Responsibilities','Requirements','How to Succeed','What We Offer','Interview Process','Skills to Prep','Why It Excites Me','Source URL'];

// Make a cell safe for single-row TSV paste: no tabs, no newlines
function cleanCell(v) {
  return String(v == null ? '' : v)
    .replace(/\t/g, ' ')
    .replace(/\r?\n/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function buildRow() {
  // Clean placeholder dashes from any unedited fields
  for (const k in extracted) {
    if (extracted[k] === '—') extracted[k] = '';
  }
  const dateSaved = new Date().toISOString().split('T')[0];
  return [
    dateSaved,
    extracted.company          || '',
    extracted.role_title       || '',
    extracted.role_family      || '',
    extracted.seniority        || '',
    extracted.industry         || '',
    extracted.company_stage    || '',
    extracted.headcount_band   || '',
    extracted.work_model       || '',
    extracted.location         || '',
    extracted.posted_date      || '',
    extracted.salary           || '',
    extracted.tech_stack       || '',
    extracted.responsibilities || '',
    extracted.requirements     || '',
    extracted.how_to_succeed   || '',
    extracted.what_we_offer    || '',
    extracted.interview_process || '',
    extracted.skills_gap       || '',
    extracted.why_exciting     || '',
    extracted.source_url       || '',
  ].map(cleanCell);
}

// Try to copy text; fall back to selecting the textarea for manual copy
function copyText(text) {
  const box = document.getElementById('pasteBox');
  box.value = text;
  box.focus();
  box.select();
  let ok = false;
  try { ok = document.execCommand('copy'); } catch(e) { ok = false; }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {}, () => {});
  }
  return ok;
}

function copyHeader() {
  const tsv = HEADER_ROW.join('\t');
  const ok = copyText(tsv);
  setStatus('saveStatus', ok ? 'success' : 'info',
    ok ? '✓ Header copied — paste into row 1 of an empty sheet.'
       : 'Header ready below — select all (Ctrl/Cmd+A) inside the box and copy.');
}

function copyRowForSheet() {
  if (!extracted) { setStatus('saveStatus', 'error', 'Nothing to copy yet.'); return; }
  const tsv = buildRow().join('\t');
  const ok = copyText(tsv);

  // Update autocomplete memory so future entries suggest these
  if (extracted.company)    acHistory.company.add(extracted.company);
  if (extracted.role_title) acHistory.title.add(extracted.role_title);
  if (extracted.location)   acHistory.location.add(extracted.location);

  setStatus('saveStatus', ok ? 'success' : 'info',
    ok ? '✓ Row copied — click the next empty cell in column A of your sheet and paste.'
       : 'Row ready below — select all (Ctrl/Cmd+A) inside the box and copy, then paste into your sheet.');
}

// ── Init ──────────────────────────────────────────────────
loadHistory();
</script>
